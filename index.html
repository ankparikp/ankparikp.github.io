<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educational Flashcards</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --surprise: #8b5cf6;
            --hp-primary: #7f1d1d;
            --solar: #ea580c;
            --math: #059669;
            --time: #d97706;
            --geo: #0284c7;
            --warning: #f59e0b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 650px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            text-align: center;
        }
        h1 {
            margin-top: 0;
            color: var(--primary);
        }
        .view {
            display: none;
        }
        .view.active {
            display: block;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        .menu-full-width {
            grid-column: 1 / -1;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        button:hover {
            opacity: 0.9;
        }
        button:active {
            transform: scale(0.98);
        }
        button.secondary {
            background-color: #64748b;
            width: auto;
            margin: 10px;
        }
        button.warning {
            background-color: var(--warning);
            width: auto;
            margin: 10px;
        }
        button.theme-surprise { background-color: var(--surprise); font-size: 18px; padding: 18px; }
        button.theme-hp { background-color: var(--hp-primary); }
        button.theme-solar { background-color: var(--solar); }
        button.theme-math { background-color: var(--math); }
        button.theme-time { background-color: var(--time); }
        button.theme-geo { background-color: var(--geo); }

        #question-display {
            font-size: 26px;
            font-weight: bold;
            margin: 30px 0;
            min-height: 80px;
            line-height: 1.4;
        }
        #answer-display {
            font-size: 36px;
            font-weight: bold;
            color: #16a34a;
            margin: 20px 0;
            min-height: 50px;
        }
        .progress {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }
        #controls {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        #start-btn { width: auto; min-width: 150px; margin: 10px; }

        @media (max-width: 500px) {
            .menu-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="home-view" class="view active">
            <h1>Knowledge Flashcards</h1>
            <p>Choose a topic to begin learning.</p>
            
            <div class="menu-grid">
                <div class="menu-full-width">
                    <button id="btn-surprise" class="theme-surprise">🎉 Surprise Me! 🎉</button>
                </div>
                <button id="btn-states">US States & Capitals</button>
                <button id="btn-hp" class="theme-hp">Harry Potter Trivia</button>
                <button id="btn-solar" class="theme-solar">Solar System</button>
                <button id="btn-geo" class="theme-geo">Continents & Countries</button>
                <button id="btn-math-perc" class="theme-math">Simple Percentages</button>
                <button id="btn-math-facts" class="theme-math">Math Facts</button>
                <div class="menu-full-width">
                    <button id="btn-time" class="theme-time">Time & Conversions</button>
                </div>
            </div>
        </div>

        <div id="quiz-view" class="view">
            <h1 id="quiz-title">Quiz</h1>
            <div class="progress" id="progress-display"></div>
            
            <div id="question-display">Click Start to begin.</div>
            <div id="answer-display"></div>

            <div id="controls">
                <button id="start-btn">Start</button>
                <button id="pause-btn" class="warning" style="display: none;">Pause</button>
                <button class="secondary" id="home-btn">Back to Menu</button>
            </div>
        </div>
    </div>
