<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educational Flashcards</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --hp-primary: #7f1d1d; /* A gryffindor-ish red for variety */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            text-align: center;
        }
        h1 {
            margin-top: 0;
            color: var(--primary);
        }
        .view {
            display: none;
        }
        .view.active {
            display: block;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            transition: opacity 0.2s;
            width: 80%;
            max-width: 300px;
        }
        button:hover {
            opacity: 0.9;
        }
        button.secondary {
            background-color: #64748b;
        }
        button.theme-hp {
            background-color: var(--hp-primary);
        }
        #question-display {
            font-size: 24px;
            font-weight: bold;
            margin: 30px 0;
            min-height: 60px;
        }
        #answer-display {
            font-size: 32px;
            font-weight: bold;
            color: #16a34a;
            margin: 20px 0;
            min-height: 40px;
        }
        .progress {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="home-view" class="view active">
            <h1>Select a Category</h1>
            <p>Choose a topic to begin learning.</p>
            <button id="category-states-btn">US States & Capitals</button>
            <br>
            <button id="category-hp-btn" class="theme-hp">Harry Potter Trivia</button>
        </div>

        <div id="quiz-view" class="view">
            <h1 id="quiz-title">Quiz</h1>
            <div class="progress" id="progress-display"></div>
            
            <div id="question-display">Click Start to begin.</div>
            <div id="answer-display"></div>

            <div id="controls">
                <button id="start-btn">Start</button>
                <button class="secondary" id="home-btn">Back to Menu</button>
            </div>
        </div>
    </div>

    <script>
        // --- Data Sources ---
        const statesData = [
            { state: "Alabama", capital: "Montgomery" }, { state: "Alaska", capital: "Juneau" },
            { state: "Arizona", capital: "Phoenix" }, { state: "Arkansas", capital: "Little Rock" },
            { state: "California", capital: "Sacramento" }, { state: "Colorado", capital: "Denver" },
            { state: "Connecticut", capital: "Hartford" }, { state: "Delaware", capital: "Dover" },
            { state: "Florida", capital: "Tallahassee" }, { state: "Georgia", capital: "Atlanta" },
            { state: "Hawaii", capital: "Honolulu" }, { state: "Idaho", capital: "Boise" },
            { state: "Illinois", capital: "Springfield" }, { state: "Indiana", capital: "Indianapolis" },
            { state: "Iowa", capital: "Des Moines" }, { state: "Kansas", capital: "Topeka" },
            { state: "Kentucky", capital: "Frankfort" }, { state: "Louisiana", capital: "Baton Rouge" },
            { state: "Maine", capital: "Augusta" }, { state: "Maryland", capital: "Annapolis" },
            { state: "Massachusetts", capital: "Boston" }, { state: "Michigan", capital: "Lansing" },
            { state: "Minnesota", capital: "Saint Paul" }, { state: "Mississippi", capital: "Jackson" },
            { state: "Missouri", capital: "Jefferson City" }, { state: "Montana", capital: "Helena" },
            { state: "Nebraska", capital: "Lincoln" }, { state: "Nevada", capital: "Carson City" },
            { state: "New Hampshire", capital: "Concord" }, { state: "New Jersey", capital: "Trenton" },
            { state: "New Mexico", capital: "Santa Fe" }, { state: "New York", capital: "Albany" },
            { state: "North Carolina", capital: "Raleigh" }, { state: "North Dakota", capital: "Bismarck" },
            { state: "Ohio", capital: "Columbus" }, { state: "Oklahoma", capital: "Oklahoma City" },
            { state: "Oregon", capital: "Salem" }, { state: "Pennsylvania", capital: "Harrisburg" },
            { state: "Rhode Island", capital: "Providence" }, { state: "South Carolina", capital: "Columbia" },
            { state: "South Dakota", capital: "Pierre" }, { state: "Tennessee", capital: "Nashville" },
            { state: "Texas", capital: "Austin" }, { state: "Utah", capital: "Salt Lake City" },
            { state: "Vermont", capital: "Montpelier" }, { state: "Virginia", capital: "Richmond" },
            { state: "Washington", capital: "Olympia" }, { state: "West Virginia", capital: "Charleston" },
            { state: "Wisconsin", capital: "Madison" }, { state: "Wyoming", capital: "Cheyenne" }
        ];

        const hpData = [
            { question: "Who is the Half-Blood Prince?", answer: "Severus Snape" },
            { question: "What is the name of Harry's pet snowy owl?", answer: "Hedwig" },
            { question: "What house is Draco Malfoy in?", answer: "Slytherin" },
            { question: "What magical core does Harry Potter's wand have?", answer: "Phoenix feather" },
            { question: "Who guards the entrance to the Gryffindor common room?", answer: "The Fat Lady" },
            { question: "What position does Harry play on the Gryffindor Quidditch team?", answer: "Seeker" },
            { question: "What is the name of the three-headed dog guarding the Philosopher's Stone?", answer: "Fluffy" },
            { question: "Who is the author of A History of Magic?", answer: "Bathilda Bagshot" },
            { question: "What is the name of the primary magical newspaper in Britain?", answer: "The Daily Prophet" },
            { question: "What shape does Arthur Weasley's Patronus take?", answer: "A weasel" },
            { question: "Which magical creature pulls the Hogwarts carriages?", answer: "Thestrals" },
            { question: "Who is the ghost of Slytherin house?", answer: "The Bloody Baron" },
            { question: "What is the name of Hagrid's giant half-brother?", answer: "Grawp" },
            { question: "What magical plant screams when uprooted?", answer: "Mandrake" },
            { question: "What spell is used to disarm an opponent?", answer: "Expelliarmus" },
            { question: "Who was the famous prisoner of Azkaban?", answer: "Sirius Black" },
            { question: "What is the name of the joke shop founded by Fred and George Weasley?", answer: "Weasleys' Wizard Wheezes" },
            { question: "What type of creature is an Acromantula?", answer: "A giant spider" },
            { question: "What is the name of the train that takes students to Hogwarts?", answer: "The Hogwarts Express" },
            { question: "Who was the headmaster of Hogwarts before Albus Dumbledore?", answer: "Armando Dippet" },
            { question: "What is the incantation to unlock a door?", answer: "Alohomora" },
            { question: "What magical object shows the deepest, most desperate desire of our hearts?", answer: "The Mirror of Erised" },
            { question: "What animal can Minerva McGonagall transform into?", answer: "A cat" },
            { question: "Who killed Dobby the house-elf?", answer: "Bellatrix Lestrange" },
            { question: "What is the street address of the Dursley family?", answer: "Number 4 Privet Drive" },
            { question: "What potion grants the drinker unusually good luck?", answer: "Felix Felicis" },
            { question: "What dark creatures guard the wizard prison Azkaban?", answer: "Dementors" },
            { question: "What is the name of Ron Weasley's pet rat?", answer: "Scabbers" },
            { question: "What type of dragon did Harry face in the Triwizard Tournament?", answer: "The Hungarian Horntail" },
            { question: "Who is the resident poltergeist at Hogwarts?", answer: "Peeves" },
            { question: "What spell produces light from the wand tip?", answer: "Lumos" },
            { question: "What is the name of Hermione's pet cat?", answer: "Crookshanks" },
            { question: "What object acts as a Portkey during the Quidditch World Cup?", answer: "An old boot" },
            { question: "Who replaced Cornelius Fudge as Minister for Magic?", answer: "Rufus Scrimgeour" },
            { question: "What is the name of Lord Voldemort's pet snake?", answer: "Nagini" },
            { question: "What is the term for a non-magical person born to magical parents?", answer: "A Squib" },
            { question: "What are the names of the four Hogwarts founders?", answer: "Godric, Helga, Rowena, and Salazar" },
            { question: "Who is the matron of the hospital wing at Hogwarts?", answer: "Madam Pomfrey" },
            { question: "What spell creates a spirit guardian?", answer: "Expecto Patronum" },
            { question: "What is the password to activate the Marauder's Map?", answer: "I solemnly swear that I am up to no good" },
            { question: "What is the name of the goblin who helps Harry break into Gringotts?", answer: "Griphook" },
            { question: "What aggressive tree destroys the flying Ford Anglia?", answer: "The Whomping Willow" },
            { question: "Who teaches Divination at Hogwarts?", answer: "Professor Trelawney" },
            { question: "What magical candy comes with a collectible wizard card?", answer: "Chocolate Frogs" },
            { question: "What is the name of the pub in Hogsmeade owned by Aberforth Dumbledore?", answer: "The Hog's Head" },
            { question: "Which Horcrux was destroyed by Neville Longbottom?", answer: "Nagini" },
            { question: "What powerful potion forces the drinker to tell the absolute truth?", answer: "Veritaserum" },
            { question: "What is the name of the village where Harry was born?", answer: "Godric's Hollow" },
            { question: "What French wizarding school does Fleur Delacour attend?", answer: "Beauxbatons" },
            { question: "What is the spell used to levitate objects?", answer: "Wingardium Leviosa" }
        ];

        // --- App State ---
        let activeCategory = ''; 
        let quizQueue = [];
        let currentIndex = 0;
        let isRunning = false;
        let timeoutId = null;

        // Force browser to preload voices if possible
        if (window.speechSynthesis) {
            window.speechSynthesis.getVoices();
        }

        // --- View Management ---
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        function openQuiz(category) {
            activeCategory = category;
            
            // Set Titles & Themes
            const titleEl = document.getElementById('quiz-title');
            if (category === 'states') {
                titleEl.innerText = "US States & Capitals";
                titleEl.style.color = "var(--primary)";
                document.getElementById('start-btn').style.backgroundColor = "var(--primary)";
            } else if (category === 'hp') {
                titleEl.innerText = "Harry Potter Trivia";
                titleEl.style.color = "var(--hp-primary)";
                document.getElementById('start-btn').style.backgroundColor = "var(--hp-primary)";
            }

            showView('quiz-view');
            resetQuizUI();
        }

        function goHome() {
            stopQuiz();
            showView('home-view');
        }

        // --- Quiz Logic ---
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function resetQuizUI() {
            document.getElementById('question-display').innerText = "Click Start to begin.";
            document.getElementById('answer-display').innerText = "";
            document.getElementById('progress-display').innerText = "";
            document.getElementById('start-btn').style.display = "inline-block";
            document.getElementById('start-btn').innerText = "Start";
        }

        function stopQuiz() {
            isRunning = false;
            clearTimeout(timeoutId);
            window.speechSynthesis.cancel();
        }

        function startQuiz() {
            stopQuiz(); 
            
            if (activeCategory === 'states') {
                quizQueue = shuffleArray(statesData);
            } else if (activeCategory === 'hp') {
                quizQueue = shuffleArray(hpData);
            }

            currentIndex = 0;
            isRunning = true;
            document.getElementById('start-btn').style.display = "none";
            nextQuestion();
        }

        function nextQuestion() {
            if (!isRunning) return;

            if (currentIndex >= quizQueue.length) {
                document.getElementById('question-display').innerText = "Quiz Complete!";
                document.getElementById('answer-display').innerText = "";
                document.getElementById('progress-display').innerText = "";
                document.getElementById('start-btn').style.display = "inline-block";
                document.getElementById('start-btn').innerText = "Restart";
                isRunning = false;
                return;
            }

            let currentItem = quizQueue[currentIndex];
            let questionText, answerText;
            
            // Format question based on category
            if (activeCategory === 'states') {
                questionText = `What is the capital of ${currentItem.state}?`;
                answerText = currentItem.capital;
            } else if (activeCategory === 'hp') {
                questionText = currentItem.question;
                answerText = currentItem.answer;
            }
            
            // Update UI
            document.getElementById('progress-display').innerText = `Question ${currentIndex + 1} of ${quizQueue.length}`;
            document.getElementById('question-display').innerText = questionText;
            document.getElementById('answer-display').innerText = "";

            // Speak question
            speakText(questionText, () => {
                if (!isRunning) return;
                // Wait 5 seconds, then show/speak answer
                timeoutId = setTimeout(() => {
                    showAnswer(answerText);
                }, 5000);
            });
        }

        function showAnswer(answerText) {
            if (!isRunning) return;
            
            document.getElementById('answer-display').innerText = answerText;
            
            // Speak answer
            speakText(answerText, () => {
                if (!isRunning) return;
                // Brief pause before the next state
                timeoutId = setTimeout(() => {
                    currentIndex++;
                    nextQuestion();
                }, 2000); 
            });
        }

        // --- Web Speech API Wrapper ---
        function speakText(text, onEndCallback) {
            if (!window.speechSynthesis) {
                console.error("Speech Synthesis not supported in this browser.");
                if (onEndCallback) onEndCallback();
                return;
            }

            // Cancel any ongoing speech
            window.speechSynthesis.cancel();

            let utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.9; 

            // Apply British Accent if Harry Potter
            if (activeCategory === 'hp') {
                // Tell the OS we prefer British English
                utterance.lang = 'en-GB'; 
                
                // Attempt to explicitly select a British voice if available in the browser
                const voices = window.speechSynthesis.getVoices();
                const britishVoice = voices.find(voice => voice.lang === 'en-GB' || voice.lang === 'en_GB');
                if (britishVoice) {
                    utterance.voice = britishVoice;
                }
            } else {
                utterance.lang = 'en-US';
            }
            
            utterance.onend = () => {
                if (onEndCallback) onEndCallback();
            };
            
            utterance.onerror = (e) => {
                console.error("Speech error:", e);
                if (onEndCallback) onEndCallback(); 
            };

            window.speechSynthesis.speak(utterance);
        }

        // --- Event Listeners ---
        document.getElementById('category-states-btn').addEventListener('click', () => openQuiz('states'));
        document.getElementById('category-hp-btn').addEventListener('click', () => openQuiz('hp'));
        document.getElementById('start-btn').addEventListener('click', startQuiz);
        document.getElementById('home-btn').addEventListener('click', goHome);
    </script>
</body>
</html>
