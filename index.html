<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educational Flashcards</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --surprise: #8b5cf6;
            --hp-primary: #7f1d1d;
            --solar: #ea580c;
            --math: #059669;
            --time: #d97706;
            --geo: #0284c7;
            --warning: #f59e0b;
            --stranger: #b91c1c;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 650px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            text-align: center;
        }
        h1 {
            margin-top: 0;
            color: var(--primary);
        }
        .view {
            display: none;
        }
        .view.active {
            display: block;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        .menu-full-width {
            grid-column: 1 / -1;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        button:hover {
            opacity: 0.9;
        }
        button:active {
            transform: scale(0.98);
        }
        button.secondary {
            background-color: #64748b;
            width: auto;
            margin: 10px;
        }
        button.warning {
            background-color: var(--warning);
            width: auto;
            margin: 10px;
        }
        button.theme-surprise { background-color: var(--surprise); font-size: 18px; padding: 18px; }
        button.theme-hp { background-color: var(--hp-primary); }
        button.theme-solar { background-color: var(--solar); }
        button.theme-math { background-color: var(--math); }
        button.theme-time { background-color: var(--time); }
        button.theme-geo { background-color: var(--geo); }
        button.theme-stranger { background-color: var(--stranger); }

        #question-display {
            font-size: 26px;
            font-weight: bold;
            margin: 30px 0;
            min-height: 80px;
            line-height: 1.4;
        }
        #answer-display {
            font-size: 36px;
            font-weight: bold;
            color: #16a34a;
            margin: 20px 0;
            min-height: 50px;
        }
        .progress {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }
        #controls {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        #start-btn { width: auto; min-width: 150px; margin: 10px; }

        @media (max-width: 500px) {
            .menu-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

    <div class="container">

                <div class="menu-full-width">

                </div>
            </div>
        </div>

        <div id="quiz-view" class="view">

            <div id="answer-display"></div>

            <div id="controls">
                <button id="start-btn">Start</button>
                <button id="pause-btn" class="warning" style="display: none;">Pause</button>
                <button class="secondary" id="home-btn">Back to Menu</button>
            </div>
        </div>
    </div>

                { q: "What year does Season 1 take place?", a: "1983" },
                { q: "What year does Season 4 take place?", a: "1986" },
                { q: "What road is Will's bike found on in the first episode?", a: "Mirkwood" }
            ],
            solar: [
                { q: "Which planet is closest to the Sun?", a: "Mercury" }, { q: "What is the largest planet in our solar system?", a: "Jupiter" },
                { q: "Which planet is known as the Red Planet?", a: "Mars" }, { q: "What planet is famous for its beautiful rings?", a: "Saturn" },
                { q: "Which planet is the hottest in our solar system?", a: "Venus" }, { q: "What is the name of our galaxy?", a: "The Milky Way" },
                { q: "What do we call a rock from space that hits the Earth's surface?", a: "A Meteorite" }, { q: "Which planet is furthest from the Sun?", a: "Neptune" },
                { q: "What is the Sun primarily made of?", a: "Hydrogen and Helium" }, { q: "What is the name of Earth's only natural satellite?", a: "The Moon" },
                { q: "Which dwarf planet was formerly considered the ninth planet?", a: "Pluto" }, { q: "What is the Great Red Spot on Jupiter?", a: "A giant storm" },
                { q: "Which planet rotates on its side?", a: "Uranus" }, { q: "What force keeps the planets in orbit around the Sun?", a: "Gravity" },
                { q: "Between which two planets is the asteroid belt located?", a: "Mars and Jupiter" }, { q: "How many planets are in our solar system?", a: "Eight" },
                { q: "Which planet has the highest mountain in the solar system, Olympus Mons?", a: "Mars" }, { q: "What do we call a dirty snowball of ice and dust in space?", a: "A Comet" },
                { q: "Which planet has a day that is longer than its year?", a: "Venus" }, { q: "What is the name of the largest moon of Saturn?", a: "Titan" }
            ],
            percentage: [
                { q: "What is 50 percent of 20?", a: "10" }, { q: "What is 100 percent of 45?", a: "45" },
                { q: "What is 10 percent of 100?", a: "10" }, { q: "What is 25 percent of 40?", a: "10" },
                { q: "What is 50 percent of 80?", a: "40" }, { q: "What is 10 percent of 50?", a: "5" },
                { q: "What is 20 percent of 100?", a: "20" }, { q: "What is 25 percent of 100?", a: "25" },
                { q: "What is 75 percent of 100?", a: "75" }, { q: "What is 50 percent of 10?", a: "5" },
                { q: "What is 10 percent of 200?", a: "20" }, { q: "What is 20 percent of 50?", a: "10" },
                { q: "What is 50 percent of 1000?", a: "500" }, { q: "What is 25 percent of 8?", a: "2" },
                { q: "What is 100 percent of 99?", a: "99" }, { q: "What is 10 percent of 30?", a: "3" },
                { q: "What is 50 percent of 60?", a: "30" }, { q: "What is 25 percent of 20?", a: "5" },
                { q: "What is 75 percent of 40?", a: "30" }, { q: "What is 10 percent of 90?", a: "9" }
            ],
            mathFacts: [
                { q: "What is 7 times 8?", a: "56" }, { q: "What is 9 times 9?", a: "81" },
                { q: "What is 12 times 12?", a: "144" }, { q: "What is 6 times 7?", a: "42" },
                { q: "What is 54 divided by 6?", a: "9" }, { q: "What is 8 times 4?", a: "32" },
                { q: "What is 15 plus 16?", a: "31" }, { q: "What is 100 minus 35?", a: "65" },
                { q: "What is 11 times 11?", a: "121" }, { q: "What is 48 divided by 8?", a: "6" },
                { q: "What is 3 cubed?", a: "27" }, { q: "What is the square root of 64?", a: "8" },
                { q: "What is 9 times 6?", a: "54" }, { q: "What is 25 plus 45?", a: "70" },
                { q: "What is 12 times 5?", a: "60" }, { q: "What is 81 divided by 9?", a: "9" },
                { q: "What is 13 times 2?", a: "26" }, { q: "What is 7 times 9?", a: "63" },
                { q: "What is 50 times 2?", a: "100" }, { q: "What is the square root of 100?", a: "10" }
            ],
            time: [
                { q: "How many seconds are in one minute?", a: "60" }, { q: "How many minutes are in one hour?", a: "60" },
                { q: "How many hours are in one day?", a: "24" }, { q: "How many days are in a week?", a: "7" },
                { q: "How many days are in a normal year?", a: "365" }, { q: "How many days are in a leap year?", a: "366" },
                { q: "How many months are in a year?", a: "12" }, { q: "How many weeks are in a year?", a: "52" },
                { q: "How many days are in the month of February during a leap year?", a: "29" }, { q: "How many years are in a decade?", a: "10" },
                { q: "How many years are in a century?", a: "100" }, { q: "How many years are in a millennium?", a: "1000" },
                { q: "How many days are in April?", a: "30" }, { q: "How many days are in July?", a: "31" },
                { q: "How many days are in November?", a: "30" }, { q: "If it is 2 P.M. now, what time will it be in 3 hours?", a: "5 P.M." },
                { q: "How many seconds are in 2 minutes?", a: "120" }, { q: "How many months have exactly 30 days?", a: "4" },
                { q: "What month comes after August?", a: "September" }, { q: "How many quarters are in an hour?", a: "4" }
            ],
            geo: [
                { q: "Which continent is the country of Brazil located in?", a: "South America" }, { q: "Which continent is the country of Egypt located in?", a: "Africa" },
                { q: "Which continent is the country of Japan located in?", a: "Asia" }, { q: "Which continent is the country of France located in?", a: "Europe" },
                { q: "Which continent is the country of Canada located in?", a: "North America" }, { q: "Which continent is the country of Kenya located in?", a: "Africa" },
                { q: "Which continent is the country of China located in?", a: "Asia" }, { q: "Which continent is the country of Argentina located in?", a: "South America" },
                { q: "Which continent is the country of Germany located in?", a: "Europe" }, { q: "Which continent is the country of Mexico located in?", a: "North America" },
                { q: "What is the largest continent by land area?", a: "Asia" }, { q: "What is the smallest continent by land area?", a: "Australia" },
                { q: "Which continent is known for being covered in ice and having no permanent residents?", a: "Antarctica" }, { q: "Which continent is the country of India located in?", a: "Asia" },
                { q: "Which continent is the country of Italy located in?", a: "Europe" }, { q: "Which continent is the country of Nigeria located in?", a: "Africa" },
                { q: "Which continent is the United States located in?", a: "North America" }, { q: "Which continent is the country of Peru located in?", a: "South America" },
                { q: "Which continent has the most countries?", a: "Africa" }, { q: "Which continent is the country of Spain located in?", a: "Europe" }
            ]
        };

        // Inject category metadata into each item for mixed "Surprise Me" mode
        Object.keys(db).forEach(categoryKey => {
            db[categoryKey].forEach(item => {
                item.category = categoryKey;
            });
        });

        // --- Background Music Setup ---
        // Replace this URL with a link to an actual Stranger Things MP3 or a local file (e.g., 'stranger-things-theme.mp3')
        const strangerMusic = new Audio('https://cdn.pixabay.com/download/audio/2022/05/16/audio_27ed1db721.mp3?filename=synthwave-80s-110045.mp3'); 
        strangerMusic.loop = true;
        strangerMusic.volume = 0.15; // Set volume to 15%

        // --- App State ---
        let activeCategory = ''; 
        let quizQueue = [];
        let currentIndex = 0;
        let isRunning = false;
        let isPaused = false;
        let currentPhase = 'idle'; // 'asking', 'waitingAnswer', 'answering', 'waitingNext'
        let timeoutId = null;
        let currentItemCache = null;

        if (window.speechSynthesis) {
            window.speechSynthesis.getVoices();
        }

        // --- View Management ---
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        function openQuiz(category, title, themeColor) {
            // Stop music if navigating while playing
            strangerMusic.pause();
            strangerMusic.currentTime = 0;
            
            activeCategory = category;
            
            const titleEl = document.getElementById('quiz-title');
            titleEl.innerText = title;
            titleEl.style.color = themeColor;
            
            const startBtn = document.getElementById('start-btn');
            startBtn.style.backgroundColor = themeColor;

            showView('quiz-view');
            resetQuizUI();
        }

        function goHome() {
            stopQuiz();
            showView('home-view');
        }

        // --- Quiz Logic ---
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function resetQuizUI() {
            document.getElementById('question-display').innerText = "Click Start to begin.";
            document.getElementById('answer-display').innerText = "";
            document.getElementById('progress-display').innerText = "";
            
            document.getElementById('start-btn').style.display = "inline-block";
            document.getElementById('start-btn').innerText = "Start";
            
            document.getElementById('pause-btn').style.display = "none";
            document.getElementById('pause-btn').innerText = "Pause";
        }

        function stopQuiz() {
            isRunning = false;
            isPaused = false;
            currentPhase = 'idle';
            clearTimeout(timeoutId);
            window.speechSynthesis.cancel();
            
            strangerMusic.pause();
            strangerMusic.currentTime = 0;
            
            resetQuizUI();
        }

        function togglePause() {
            if (!isRunning) return;

            isPaused = !isPaused;
            const pauseBtn = document.getElementById('pause-btn');

            if (isPaused) {
                pauseBtn.innerText = 'Resume';
                clearTimeout(timeoutId);
                window.speechSynthesis.pause();
                strangerMusic.pause();
            } else {
                pauseBtn.innerText = 'Pause';
                window.speechSynthesis.resume();
                
                if (activeCategory === 'stranger' || activeCategory === 'surprise') {
                     // In 'surprise', you could add logic to only play during stranger questions, 
                     // but for simplicity we'll just trigger it if the whole category is stranger.
                     if (activeCategory === 'stranger') {
                         strangerMusic.play().catch(e => console.log("Audio play failed:", e));
                     }
                }
                
                // If we paused during a quiet waiting period, restart that timer
                if (currentPhase === 'waitingAnswer') {
                    startWaitAnswer();
                } else if (currentPhase === 'waitingNext') {
                    startWaitNext();
                }
            }
        }

        function startQuiz() {
            stopQuiz(); 
            
            if (activeCategory === 'surprise') {
                let allQuestions = [].concat(
                    db.states, db.hp, db.solar, 
                    db.percentage, db.mathFacts, db.time, db.geo, db.stranger
                );
                quizQueue = shuffleArray(allQuestions).slice(0, 50);
            } else {
                quizQueue = shuffleArray(db[activeCategory]);
            }

            if (activeCategory === 'stranger') {
                strangerMusic.play().catch(e => console.log("Audio play failed. User interaction may be required by the browser.", e));
            }

            currentIndex = 0;
            isRunning = true;
            isPaused = false;
            
            document.getElementById('start-btn').style.display = "none";
            document.getElementById('pause-btn').style.display = "inline-block";
            
            nextQuestion();
        }

        function nextQuestion() {
            if (!isRunning) return;

            if (currentIndex >= quizQueue.length) {
                document.getElementById('question-display').innerText = "Quiz Complete!";
                document.getElementById('answer-display').innerText = "";
                document.getElementById('progress-display').innerText = "";
                document.getElementById('start-btn').style.display = "inline-block";
                document.getElementById('start-btn').innerText = "Restart";
                document.getElementById('pause-btn').style.display = "none";
                isRunning = false;
                currentPhase = 'idle';
                
                strangerMusic.pause();
                strangerMusic.currentTime = 0;
                
                return;
            }

            currentItemCache = quizQueue[currentIndex];
            currentPhase = 'asking';
            
            document.getElementById('progress-display').innerText = `Question ${currentIndex + 1} of ${quizQueue.length}`;
            document.getElementById('question-display').innerText = currentItemCache.q;
            document.getElementById('answer-display').innerText = "";

            speakText(currentItemCache.q, currentItemCache.category, () => {
                if (!isRunning) return;
                startWaitAnswer();
            });
        }

        function startWaitAnswer() {
            currentPhase = 'waitingAnswer';
            if (isPaused) return; 
            
            timeoutId = setTimeout(() => {
                showAnswer();
            }, 5000);
        }

        function showAnswer() {
            if (!isRunning) return;
            currentPhase = 'answering';
            
            document.getElementById('answer-display').innerText = currentItemCache.a;
            
            speakText(currentItemCache.a, currentItemCache.category, () => {
                if (!isRunning) return;
                startWaitNext();
            });
        }

        function startWaitNext() {
            currentPhase = 'waitingNext';
            if (isPaused) return;

            timeoutId = setTimeout(() => {
                currentIndex++;
                nextQuestion();
            }, 2000); 
        }

        // --- Web Speech API Wrapper ---
        function speakText(text, itemCategory, onEndCallback) {
            if (!window.speechSynthesis) {
                console.error("Speech Synthesis not supported in this browser.");
                if (onEndCallback) onEndCallback();
                return;
            }

            window.speechSynthesis.cancel();

            let utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.9; 

            if (itemCategory === 'hp') {
                utterance.lang = 'en-GB'; 
                const voices = window.speechSynthesis.getVoices();
                const britishVoice = voices.find(voice => voice.lang === 'en-GB' || voice.lang === 'en_GB');
                if (britishVoice) {
                    utterance.voice = britishVoice;
                }
            } else {
                utterance.lang = 'en-US';
            }
            
            utterance.onend = () => { 
                // Don't fire callback if speech ended due to quiz stopping entirely
                if (isRunning && onEndCallback) onEndCallback(); 
            };
            
            utterance.onerror = (e) => { 
                console.error("Speech error:", e);
                if (isRunning && onEndCallback) onEndCallback(); 
            };

            window.speechSynthesis.speak(utterance);
        }

        // --- Event Listeners ---
        document.getElementById('btn-surprise').addEventListener('click', () => openQuiz('surprise', '✨ Surprise Me! ✨', 'var(--surprise)'));
        document.getElementById('btn-states').addEventListener('click', () => openQuiz('states', 'US States & Capitals', 'var(--primary)'));
        document.getElementById('btn-hp').addEventListener('click', () => openQuiz('hp', 'Harry Potter Trivia', 'var(--hp-primary)'));
        document.getElementById('btn-stranger').addEventListener('click', () => openQuiz('stranger', 'Stranger Things Trivia', 'var(--stranger)'));
        document.getElementById('btn-solar').addEventListener('click', () => openQuiz('solar', 'Solar System', 'var(--solar)'));
        document.getElementById('btn-math-perc').addEventListener('click', () => openQuiz('percentage', 'Simple Percentages', 'var(--math)'));
        document.getElementById('btn-math-facts').addEventListener('click', () => openQuiz('mathFacts', 'Math Facts', 'var(--math)'));
        document.getElementById('btn-time').addEventListener('click', () => openQuiz('time', 'Time & Conversions', 'var(--time)'));
        document.getElementById('btn-geo').addEventListener('click', () => openQuiz('geo', 'Continents & Countries', 'var(--geo)'));

        document.getElementById('start-btn').addEventListener('click', startQuiz);
        document.getElementById('pause-btn').addEventListener('click', togglePause);
        document.getElementById('home-btn').addEventListener('click', goHome);
    </script>
</body>
</html>
