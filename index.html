<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educational Flashcards</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --surprise: #8b5cf6;
            --hp-primary: #7f1d1d;
            --solar: #ea580c;
            --math: #059669;
            --time: #d97706;
            --geo: #0284c7;
            --warning: #f59e0b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 650px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            text-align: center;
        }
        h1 {
            margin-top: 0;
            color: var(--primary);
        }
        .view {
            display: none;
        }
        .view.active {
            display: block;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        .menu-full-width {
            grid-column: 1 / -1;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        button:hover {
            opacity: 0.9;
        }
        button:active {
            transform: scale(0.98);
        }
        button.secondary {
            background-color: #64748b;
            width: auto;
            margin: 10px;
        }
        button.warning {
            background-color: var(--warning);
            width: auto;
            margin: 10px;
        }
        button.theme-surprise { background-color: var(--surprise); font-size: 18px; padding: 18px; }
        button.theme-hp { background-color: var(--hp-primary); }
        button.theme-solar { background-color: var(--solar); }
        button.theme-math { background-color: var(--math); }
        button.theme-time { background-color: var(--time); }
        button.theme-geo { background-color: var(--geo); }

        #question-display {
            font-size: 26px;
            font-weight: bold;
            margin: 30px 0;
            min-height: 80px;
            line-height: 1.4;
        }
        #answer-display {
            font-size: 36px;
            font-weight: bold;
            color: #16a34a;
            margin: 20px 0;
            min-height: 50px;
        }
        .progress {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }
        #controls {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        #start-btn { width: auto; min-width: 150px; margin: 10px; }

        @media (max-width: 500px) {
            .menu-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="home-view" class="view active">
            <h1>Knowledge Flashcards</h1>
            <p>Choose a topic to begin learning.</p>
            
            <div class="menu-grid">
                <div class="menu-full-width">
                    <button id="btn-surprise" class="theme-surprise">🎉 Surprise Me! 🎉</button>
                </div>
                <button id="btn-states">US States & Capitals</button>
                <button id="btn-hp" class="theme-hp">Harry Potter Trivia</button>
                <button id="btn-solar" class="theme-solar">Solar System</button>
                <button id="btn-geo" class="theme-geo">Continents & Countries</button>
                <button id="btn-math-perc" class="theme-math">Simple Percentages</button>
                <button id="btn-math-facts" class="theme-math">Math Facts</button>
                <div class="menu-full-width">
                    <button id="btn-time" class="theme-time">Time & Conversions</button>
                </div>
            </div>
        </div>

        <div id="quiz-view" class="view">
            <h1 id="quiz-title">Quiz</h1>
            <div class="progress" id="progress-display"></div>
            
            <div id="question-display">Click Start to begin.</div>
            <div id="answer-display"></div>

            <div id="controls">
                <button id="start-btn">Start</button>
                <button id="pause-btn" class="warning" style="display: none;">Pause</button>
                <button class="secondary" id="home-btn">Back to Menu</button>
            </div>
        </div>
    </div>

        // Inject category metadata into each item for mixed "Surprise Me" mode
        Object.keys(db).forEach(categoryKey => {
            db[categoryKey].forEach(item => {
                item.category = categoryKey;
            });

        // --- App State ---
        let activeCategory = ''; 
        let quizQueue = [];
        let currentIndex = 0;
        let isRunning = false;
        let isPaused = false;
        let currentPhase = 'idle'; // 'asking', 'waitingAnswer', 'answering', 'waitingNext'
        let timeoutId = null;
        let currentItemCache = null;

        if (window.speechSynthesis) {
            window.speechSynthesis.getVoices();
        }

        // --- View Management ---
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        function openQuiz(category, title, themeColor) {
            activeCategory = category;
            
            const titleEl = document.getElementById('quiz-title');
            titleEl.innerText = title;
            titleEl.style.color = themeColor;
            
            const startBtn = document.getElementById('start-btn');
            startBtn.style.backgroundColor = themeColor;

            showView('quiz-view');
            resetQuizUI();
        }

        function goHome() {
            stopQuiz();
            showView('home-view');
        }

        // --- Quiz Logic ---
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function resetQuizUI() {
            document.getElementById('question-display').innerText = "Click Start to begin.";
            document.getElementById('answer-display').innerText = "";
            document.getElementById('progress-display').innerText = "";
            
            document.getElementById('start-btn').style.display = "inline-block";
            document.getElementById('start-btn').innerText = "Start";
            
            document.getElementById('pause-btn').style.display = "none";
            document.getElementById('pause-btn').innerText = "Pause";
        }

        function stopQuiz() {
            isRunning = false;
            isPaused = false;
            currentPhase = 'idle';
            clearTimeout(timeoutId);
            window.speechSynthesis.cancel();
            resetQuizUI();
        }

        function togglePause() {
            if (!isRunning) return;

            isPaused = !isPaused;
            const pauseBtn = document.getElementById('pause-btn');

            if (isPaused) {
                pauseBtn.innerText = 'Resume';
                clearTimeout(timeoutId);
                window.speechSynthesis.pause();
            } else {
                pauseBtn.innerText = 'Pause';
                window.speechSynthesis.resume();
                
                // If we paused during a quiet waiting period, restart that timer
                if (currentPhase === 'waitingAnswer') {
                    startWaitAnswer();
                } else if (currentPhase === 'waitingNext') {
                    startWaitNext();
                }
            }
        }

        function startQuiz() {
            stopQuiz(); 
            
            if (activeCategory === 'surprise') {
                let allQuestions = [].concat(
                    db.states, db.hp, db.solar, 
                    db.percentage, db.mathFacts, db.time, db.geo
                );
                quizQueue = shuffleArray(allQuestions).slice(0, 50);
            } else {
                quizQueue = shuffleArray(db[activeCategory]);
            }

            currentIndex = 0;
            isRunning = true;
            isPaused = false;
            
            document.getElementById('start-btn').style.display = "none";
            document.getElementById('pause-btn').style.display = "inline-block";
            
            nextQuestion();
        }

        function nextQuestion() {
            if (!isRunning) return;

            if (currentIndex >= quizQueue.length) {
                document.getElementById('question-display').innerText = "Quiz Complete!";
                document.getElementById('answer-display').innerText = "";
                document.getElementById('progress-display').innerText = "";
                document.getElementById('start-btn').style.display = "inline-block";
                document.getElementById('start-btn').innerText = "Restart";
                document.getElementById('pause-btn').style.display = "none";
                isRunning = false;
                currentPhase = 'idle';
                return;
            }

            currentItemCache = quizQueue[currentIndex];
            currentPhase = 'asking';
            
            document.getElementById('progress-display').innerText = `Question ${currentIndex + 1} of ${quizQueue.length}`;
            document.getElementById('question-display').innerText = currentItemCache.q;
            document.getElementById('answer-display').innerText = "";

            speakText(currentItemCache.q, currentItemCache.category, () => {
                if (!isRunning) return;
                startWaitAnswer();
            });
        }

        function startWaitAnswer() {
            currentPhase = 'waitingAnswer';
            if (isPaused) return; 
            
            timeoutId = setTimeout(() => {
                showAnswer();
            }, 5000);
        }

        function showAnswer() {
            if (!isRunning) return;
            currentPhase = 'answering';
            
            document.getElementById('answer-display').innerText = currentItemCache.a;
            
            speakText(currentItemCache.a, currentItemCache.category, () => {
                if (!isRunning) return;
                startWaitNext();
            });
        }

        function startWaitNext() {
            currentPhase = 'waitingNext';
            if (isPaused) return;

            timeoutId = setTimeout(() => {
                currentIndex++;
                nextQuestion();
            }, 2000); 
        }

        // --- Web Speech API Wrapper ---
        function speakText(text, itemCategory, onEndCallback) {
            if (!window.speechSynthesis) {
                console.error("Speech Synthesis not supported in this browser.");
                if (onEndCallback) onEndCallback();
                return;
            }

            window.speechSynthesis.cancel();

            let utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.9; 

            if (itemCategory === 'hp') {
                utterance.lang = 'en-GB'; 
                const voices = window.speechSynthesis.getVoices();
                const britishVoice = voices.find(voice => voice.lang === 'en-GB' || voice.lang === 'en_GB');
                if (britishVoice) {
                    utterance.voice = britishVoice;
                }
            } else {
                utterance.lang = 'en-US';
            }
            
            utterance.onend = () => { 
                // Don't fire callback if speech ended due to quiz stopping entirely
                if (isRunning && onEndCallback) onEndCallback(); 
            };
            
            utterance.onerror = (e) => { 
                console.error("Speech error:", e);
                if (isRunning && onEndCallback) onEndCallback(); 
            };

            window.speechSynthesis.speak(utterance);
        }

        // --- Event Listeners ---
        document.getElementById('btn-surprise').addEventListener('click', () => openQuiz('surprise', '🎉 Surprise Me! 🎉', 'var(--surprise)'));
        document.getElementById('btn-states').addEventListener('click', () => openQuiz('states', 'US States & Capitals', 'var(--primary)'));
        document.getElementById('btn-hp').addEventListener('click', () => openQuiz('hp', 'Harry Potter Trivia', 'var(--hp-primary)'));
        document.getElementById('btn-solar').addEventListener('click', () => openQuiz('solar', 'Solar System', 'var(--solar)'));
        document.getElementById('btn-math-perc').addEventListener('click', () => openQuiz('percentage', 'Simple Percentages', 'var(--math)'));
        document.getElementById('btn-math-facts').addEventListener('click', () => openQuiz('mathFacts', 'Math Facts', 'var(--math)'));
        document.getElementById('btn-time').addEventListener('click', () => openQuiz('time', 'Time & Conversions', 'var(--time)'));
        document.getElementById('btn-geo').addEventListener('click', () => openQuiz('geo', 'Continents & Countries', 'var(--geo)'));

        document.getElementById('start-btn').addEventListener('click', startQuiz);
        document.getElementById('pause-btn').addEventListener('click', togglePause);
        document.getElementById('home-btn').addEventListener('click', goHome);
    </script>
</body>
</html>
